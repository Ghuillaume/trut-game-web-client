name: Frontend CI

on:
  push:
    branches: [main]
    paths: [game-client/**]
  pull_request:
    types: [opened, synchronize, reopened]
    paths: [game-client/**]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: game-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: game-client/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run test
